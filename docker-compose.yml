services:
  urdf-exporter:
    build: .
    image: urdf-exporter:latest
    container_name: urdf-exporter
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./jobs:/app/jobs
    environment:
      - ONSHAPE_ACCESS_KEY=${ONSHAPE_ACCESS_KEY:-}
      - ONSHAPE_SECRET_KEY=${ONSHAPE_SECRET_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Cloudflare Quick Tunnel ─────────────────────────────────────
  # Provides a public https://*.trycloudflare.com URL automatically.
  # To use a named tunnel with a fixed domain instead:
  #   set TUNNEL_TOKEN=<your token from Zero Trust dashboard> in .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: urdf-cloudflared
    restart: unless-stopped
    depends_on:
      - urdf-exporter
    command: >
      tunnel --no-autoupdate --url http://urdf-exporter:8000
    networks:
      - default
