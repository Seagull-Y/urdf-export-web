services:
  urdf-exporter:
    build: .
    image: urdf-exporter:latest
    container_name: urdf-exporter
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./jobs:/app/jobs
    environment:
      - ONSHAPE_ACCESS_KEY=${ONSHAPE_ACCESS_KEY:-}
      - ONSHAPE_SECRET_KEY=${ONSHAPE_SECRET_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Cloudflare Tunnel ───────────────────────────────────────────
  # - If TUNNEL_TOKEN is set in .env → named tunnel (fixed domain)
  # - Otherwise → quick tunnel (random trycloudflare.com URL)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: urdf-cloudflared
    restart: unless-stopped
    depends_on:
      - urdf-exporter
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    entrypoint: >
      sh -c '
        if [ -n "$$TUNNEL_TOKEN" ]; then
          cloudflared tunnel --no-autoupdate run --token "$$TUNNEL_TOKEN";
        else
          cloudflared tunnel --no-autoupdate --url http://urdf-exporter:8000;
        fi
      '
    networks:
      - default
