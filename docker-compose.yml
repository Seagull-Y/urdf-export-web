services:
  urdf-exporter:
    build: .
    image: urdf-exporter:latest
    container_name: urdf-exporter
    # Expose port locally only; cloudflare tunnel handles public access
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./jobs:/app/jobs
    environment:
      - ONSHAPE_ACCESS_KEY=${ONSHAPE_ACCESS_KEY:-}
      - ONSHAPE_SECRET_KEY=${ONSHAPE_SECRET_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/jobs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Cloudflare Tunnel ───────────────────────────────────────────
  # Option A (quick share, no account): set TUNNEL_TOKEN=quick
  # Option B (named tunnel):            set TUNNEL_TOKEN=<your token>
  #   Get token: Cloudflare dashboard → Zero Trust → Tunnels → Create tunnel
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: urdf-cloudflared
    restart: unless-stopped
    depends_on:
      - urdf-exporter
    command: >
      tunnel --no-autoupdate run
      --token ${TUNNEL_TOKEN:-}
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    # Only active when TUNNEL_TOKEN is set; otherwise use quick tunnel manually
    profiles:
      - tunnel
